[package]
name = "jailguard"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Prompt injection and jailbreak defense using neural networks"
repository = "https://github.com/yfedoseev/jailguard"
keywords = ["security", "llm", "prompt-injection", "jailbreak", "ai-safety"]
categories = ["security", "machine-learning"]

[dependencies]
# Burn deep learning framework
burn = { version = "0.16", default-features = false }
burn-ndarray = { version = "0.16", default-features = false }
burn-wgpu = { version = "0.16", optional = true }
# burn-train with metrics but not TUI to avoid unicode-width version conflicts
burn-train = { version = "0.16", default-features = false, features = ["metrics"], optional = true }

# Core dependencies
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
tracing = "0.1"

# Tokenization
unicode-segmentation = "1.12"

# Random number generation for exploration
rand = "0.8"

# UUID for detection result tracking
uuid = { version = "1", features = ["v4", "serde"] }

# Directories for pretrained model storage
dirs = "5.0"

# HTTP client for dataset download
reqwest = { version = "0.12", features = ["json", "stream"], optional = true }

# Async runtime for download
tokio = { version = "1", features = ["full"], optional = true }

# CSV parsing
csv = { version = "1.3", optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = ["cpu"]
cpu = []
wgpu = ["dep:burn-wgpu", "burn/wgpu"]
# Use burn-train directly with metrics but not TUI to avoid unicode-width version conflicts
train = ["dep:burn-train"]
pretrained = []
download = ["dep:reqwest", "dep:tokio", "dep:csv"]

[[example]]
name = "train"
required-features = ["download"]
