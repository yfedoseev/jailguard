[package]
name = "jailguard"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Prompt injection and jailbreak defense using neural networks"
repository = "https://github.com/yfedoseev/jailguard"
keywords = ["security", "llm", "prompt-injection", "jailbreak", "ai-safety"]
categories = ["security", "machine-learning"]

[dependencies]
# Burn deep learning framework
burn = { version = "0.19", default-features = false }
burn-ndarray = { version = "0.19", default-features = false }
burn-wgpu = { version = "0.19", optional = true }
# burn-train with sys-metrics but not TUI to avoid unicode-width version conflicts
burn-train = { version = "0.19", default-features = false, features = ["sys-metrics"], optional = true }

# Core dependencies
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
tracing = "0.1"

# Tokenization
unicode-segmentation = "1.12"

# Random number generation for exploration
rand = "0.8"

# UUID for detection result tracking
uuid = { version = "1", features = ["v4", "serde"] }

# Directories for pretrained model storage
dirs = "5.0"

# HTTP client for dataset download
reqwest = { version = "0.12", features = ["json", "stream"], optional = true }

# Async runtime for download
tokio = { version = "1", features = ["full"], optional = true }

# CSV parsing
csv = { version = "1.3", optional = true }

# ONNX Runtime for semantic embeddings (all-MiniLM-L6-v2)
# Note: For now we'll mock this - in production, use official ONNX Runtime
# ort = { version = "1.18", features = ["load-dynamic"], optional = true }
# Temporarily using a mock implementation - see semantic_embedder.rs
# To enable real ONNX support, install ONNX Runtime system library

# LRU cache for embedding caching
lru = "0.12"

# Pattern matching for secret detection and injection markers
regex = "1"

# Lazy static initialization for regex patterns
once_cell = "1"

# SafeTensors for Hugging Face compatibility
safetensors = "0.4"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = ["cpu", "semantic-embeddings"]
cpu = []
wgpu = ["dep:burn-wgpu", "burn/wgpu"]
# Use burn-train directly with metrics but not TUI to avoid unicode-width version conflicts
train = ["dep:burn-train"]
pretrained = ["semantic-embeddings"]
download = ["dep:reqwest", "dep:tokio", "dep:csv"]
# Semantic embeddings using all-MiniLM-L6-v2 (enabled by default)
# Currently uses hash-based embeddings; can integrate ONNX Runtime when available
semantic-embeddings = []

# Training examples
[[example]]
name = "train_neural_binary"
path = "examples/train/train_neural_binary.rs"
required-features = ["download"]

[[example]]
name = "train_on_expanded_dataset"
path = "examples/train/train_on_expanded_dataset.rs"

[[example]]
name = "train_minilm_with_gradients"
path = "examples/train/train_minilm_with_gradients.rs"

[[example]]
name = "evaluate_on_test_set"
path = "examples/train/evaluate_on_test_set.rs"

[[example]]
name = "fast_embedding_generation"
path = "examples/train/fast_embedding_generation.rs"

# Inference examples
[[example]]
name = "load_and_inference"
path = "examples/inference/load_and_inference.rs"

[[example]]
name = "production_inference"
path = "examples/inference/production_inference.rs"

[[example]]
name = "api_server"
path = "examples/inference/api_server.rs"

[[example]]
name = "verify_json_model"
path = "examples/inference/verify_json_model.rs"

# Evaluation examples
[[example]]
name = "evaluate_detector"
path = "examples/evaluation/evaluate_detector.rs"

[[example]]
name = "comprehensive_evaluation"
path = "examples/evaluation/comprehensive_evaluation.rs"

[[example]]
name = "phase_9_sota_validation"
path = "examples/evaluation/phase_9_sota_validation.rs"

[[example]]
name = "compare_embeddings"
path = "examples/evaluation/compare_embeddings.rs"

# Ensemble examples
[[example]]
name = "ensemble_demo"
path = "examples/ensemble/ensemble_demo.rs"

[[example]]
name = "unified_api_ensemble_demo"
path = "examples/ensemble/unified_api_ensemble_demo.rs"

[[example]]
name = "full_pipeline"
path = "examples/ensemble/full_pipeline.rs"

[lints.rust]
unsafe_code = "warn"
missing_docs = "warn"

[lints.clippy]
# Deny dangerous patterns in production
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
print_stdout = "warn"
print_stderr = "warn"

# Pedantic lints (cherry-picked for value)
cloned_instead_of_copied = "warn"
doc_markdown = "warn"
explicit_iter_loop = "warn"
flat_map_option = "warn"
fn_params_excessive_bools = "warn"
inefficient_to_string = "warn"
manual_let_else = "warn"
map_unwrap_or = "warn"
needless_pass_by_value = "warn"
redundant_closure_for_method_calls = "warn"
semicolon_if_nothing_returned = "warn"
unnecessary_wraps = "warn"
unused_async = "warn"

# Cargo group
cargo_common_metadata = "warn"
