name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the full matrix but skip publish steps"
        required: true
        type: boolean
        default: true

permissions:
  contents: write   # GitHub release creation
  id-token: write   # npm provenance

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================================================
  # Pre-flight — validate version bump, license files, changelog
  # ===========================================================================
  preflight:
    name: pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_dry_run: ${{ steps.v.outputs.is_dry_run }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Extract version
        id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="$(grep -E '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
            echo "is_dry_run=${{ inputs.dry-run }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "is_dry_run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify Cargo.toml version matches tag
        if: github.event_name == 'push'
        run: |
          CARGO_VERSION="$(grep -E '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [[ "$CARGO_VERSION" != "${{ steps.v.outputs.version }}" ]]; then
            echo "::error::Cargo.toml version $CARGO_VERSION does not match tag ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: Verify pyproject.toml version matches
        run: |
          PY_VERSION="$(grep -E '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [[ "$PY_VERSION" != "${{ steps.v.outputs.version }}" ]]; then
            echo "::error::pyproject.toml version $PY_VERSION does not match Cargo.toml ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: Verify js/package.json version matches
        run: |
          JS_VERSION="$(node -p "require('./js/package.json').version")"
          if [[ "$JS_VERSION" != "${{ steps.v.outputs.version }}" ]]; then
            echo "::error::js/package.json version $JS_VERSION does not match Cargo.toml ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: Verify elixir/mix.exs version matches
        run: |
          MIX_VERSION="$(grep -E '^\s*@version\s+"' elixir/mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [[ "$MIX_VERSION" != "${{ steps.v.outputs.version }}" ]]; then
            echo "::error::elixir/mix.exs version $MIX_VERSION does not match Cargo.toml ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: Verify CHANGELOG entry exists
        run: |
          if ! grep -q "## \[${{ steps.v.outputs.version }}\]\|## ${{ steps.v.outputs.version }}\b" CHANGELOG.md; then
            echo "::warning::No CHANGELOG entry for version ${{ steps.v.outputs.version }}"
          fi

      - name: Verify LICENSE files present
        run: |
          test -f LICENSE-MIT    && echo "LICENSE-MIT OK"
          test -f LICENSE-APACHE && echo "LICENSE-APACHE OK"

  # ===========================================================================
  # Native cdylib build matrix (Go + JS native module + C consumers)
  # ===========================================================================
  build-native:
    name: native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            # .cargo/config.toml pins `-C target-feature=-crt-static` for this
            # triple, plus the CFLAGS_x86_64_pc_windows_msvc /MD env var below,
            # which together force cc-rs and rustc to agree on /MD across
            # ort-sys + esaxx-rs (was LNK2038 in pre-0.1.2 builds).
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      # Swatinem/rust-cache disabled on macOS — see go.yml comment.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: ${{ !contains(matrix.target, 'apple-darwin') }}
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Ensure rustup default stable + cargo on PATH (macOS shim workaround)
        shell: bash
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup default stable
          rustup show active-toolchain
          cargo --version

      - name: Build cdylib + staticlib
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CFLAGS_x86_64_pc_windows_msvc: /MD
          CXXFLAGS_x86_64_pc_windows_msvc: /MD
        run: rustup run stable cargo build --locked --release --lib --target ${{ matrix.target }}

      - name: Build napi addon for ${{ matrix.target }}
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CFLAGS_x86_64_pc_windows_msvc: /MD
          CXXFLAGS_x86_64_pc_windows_msvc: /MD
        run: rustup run stable cargo build --locked --release --features napi --target ${{ matrix.target }}

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p release-stage/${{ matrix.target }}
          cp -v target/${{ matrix.target }}/release/libjailguard.* \
                release-stage/${{ matrix.target }}/ 2>/dev/null || true
          cp -v target/${{ matrix.target }}/release/jailguard.{dll,lib} \
                release-stage/${{ matrix.target }}/ 2>/dev/null || true
          cp -v include/jailguard.h release-stage/${{ matrix.target }}/

      - name: Stage napi addon
        shell: bash
        run: |
          mkdir -p addon-stage
          dest="addon-stage/jailguard.${{ matrix.target }}.node"
          case "${{ matrix.target }}" in
            *-linux-*)   cp target/${{ matrix.target }}/release/libjailguard.so   "$dest" ;;
            *-apple-*)   cp target/${{ matrix.target }}/release/libjailguard.dylib "$dest" ;;
            *-windows-*) cp target/${{ matrix.target }}/release/jailguard.dll     "$dest" ;;
          esac
          ls -la "$dest"

      - name: Strip napi addon (Linux/macOS only)
        shell: bash
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          # Strip debug symbols from the .node addon. Cuts the file size
          # ~30-40% (e.g., ~17 MB → ~12 MB on Linux). Skipped on Windows
          # because the MSVC linker doesn't produce strippable symbols.
          dest="addon-stage/jailguard.${{ matrix.target }}.node"
          before=$(wc -c < "$dest")
          case "${{ matrix.target }}" in
            *-linux-*)
              # Cross-compiled ARM64 needs the matching toolchain's strip.
              if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
                aarch64-linux-gnu-strip --strip-unneeded "$dest"
              else
                strip --strip-unneeded "$dest"
              fi
              ;;
            *-apple-*)
              strip -x "$dest"
              ;;
          esac
          after=$(wc -c < "$dest")
          echo "stripped ${{ matrix.target }}: $before bytes → $after bytes"

      - name: SHA-256 manifest
        shell: bash
        run: |
          cd release-stage/${{ matrix.target }}
          if command -v sha256sum >/dev/null; then
            sha256sum * > SHA256SUMS
          else
            shasum -a 256 * > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Upload native lib bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-${{ matrix.target }}
          path: release-stage/${{ matrix.target }}/

      - name: Upload napi addon
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: addon-${{ matrix.target }}
          path: addon-stage/jailguard.${{ matrix.target }}.node

  # ===========================================================================
  # Python wheels (the heaviest matrix — defers to phase-2 python.yml shape)
  # ===========================================================================
  build-wheels-linux:
    name: wheel (linux ${{ matrix.target }} ${{ matrix.manylinux }})
    runs-on: ubuntu-latest
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: manylinux_2_28
          - target: aarch64
            manylinux: manylinux_2_28
          # musllinux (Alpine) excluded: ort-sys 2.0.0-rc.9 ships no
          # prebuilt onnxruntime for *-unknown-linux-musl. Re-enable
          # when upstream ships musl binaries or we vendor our own.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --features python --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.manylinux }}
          path: dist/*.whl

  build-wheels-macos:
    name: wheel (macos ${{ matrix.target }})
    runs-on: macos-latest
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --features python --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  build-wheels-windows:
    name: wheel (windows ${{ matrix.target }})
    runs-on: windows-latest
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        target: [x64]
    env:
      # See comment on build-native for the /MD + -crt-static rationale.
      CFLAGS_x86_64_pc_windows_msvc: /MD
      CXXFLAGS_x86_64_pc_windows_msvc: /MD
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --features python --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ===========================================================================
  # Elixir Rustler NIFs — one .tar.gz per (target, nif-version) pair.
  # rustler_precompiled looks up these artifacts on the GitHub release at
  # install time, verified against the bundled checksum-Elixir.JailGuard.Native.exs.
  # ===========================================================================
  build-elixir-nifs:
    name: elixir NIF ${{ matrix.nif }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        # Cartesian product of nif × target via base matrix; `include`
        # below attaches the right runner OS to each target. Listing
        # target only in `include:` produced just the Windows cells —
        # GH Actions's include semantics didn't cross-multiply with
        # the base `nif:` list. With target in base, we get the full
        # 2 × 5 = 10 cells we want.
        nif: ["2.16", "2.17"]
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      RUSTLER_NIF_VERSION: ${{ matrix.nif }}
      # Windows CRT — see .cargo/config.toml.
      CFLAGS_x86_64_pc_windows_msvc: /MD
      CXXFLAGS_x86_64_pc_windows_msvc: /MD
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # cargo + rustler_precompiled-shaped packaging, done inline.
      # We previously used philss/rustler-precompiled-action, but both
      # v1.1.4 and v1.1.5 unconditionally try to extract a Linux cross-rs
      # tarball on every runner (including Windows, where tar.exe doesn't
      # support --wildcards). The composite action's `if: ${{ inputs.use-cross }}`
      # gate doesn't short-circuit because boolean inputs in composite
      # actions stringify to "false" — which is truthy in GH Actions
      # expression context. Doing the cargo build and tarball naming
      # inline avoids the action entirely.
      - name: cargo build
        shell: bash
        working-directory: elixir/native/jailguard_nif
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package as rustler_precompiled tarball
        id: package
        shell: bash
        run: |
          set -euo pipefail
          # rustler_precompiled artifact naming:
          #   <libprefix><crate>-v<version>-nif-<nif>-<target>.<ext>.tar.gz
          # libprefix is "lib" on Linux/macOS, empty on Windows.
          # ext is ".so" on Linux+macOS (macOS .dylib renamed to .so) and ".dll" on Windows.
          case "${{ matrix.target }}" in
            *-pc-windows-*)
              SRC="elixir/native/jailguard_nif/target/${{ matrix.target }}/release/jailguard_nif.dll"
              FINAL_NAME="jailguard_nif-v${{ needs.preflight.outputs.version }}-nif-${{ matrix.nif }}-${{ matrix.target }}.dll"
              ;;
            *-apple-*)
              SRC="elixir/native/jailguard_nif/target/${{ matrix.target }}/release/libjailguard_nif.dylib"
              FINAL_NAME="libjailguard_nif-v${{ needs.preflight.outputs.version }}-nif-${{ matrix.nif }}-${{ matrix.target }}.so"
              ;;
            *)
              SRC="elixir/native/jailguard_nif/target/${{ matrix.target }}/release/libjailguard_nif.so"
              FINAL_NAME="libjailguard_nif-v${{ needs.preflight.outputs.version }}-nif-${{ matrix.nif }}-${{ matrix.target }}.so"
              ;;
          esac
          test -f "$SRC"
          cp "$SRC" "$FINAL_NAME"
          tar -czf "${FINAL_NAME}.tar.gz" "$FINAL_NAME"
          rm "$FINAL_NAME"
          ls -la "${FINAL_NAME}.tar.gz"
          echo "file-path=${FINAL_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "file-name=${FINAL_NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload NIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nif-${{ matrix.nif }}-${{ matrix.target }}
          path: ${{ steps.package.outputs.file-path }}

  # ===========================================================================
  # NIF static smoke test — extracts the just-built tarball and verifies the
  # inner .so/.dylib/.dll exists, has plausible size, and (on platforms with
  # nm available) exports the `nif_init` symbol that beam.smp dlopens.
  #
  # Deliberately does NOT run the NIF from Elixir: in dry-run mode the
  # corresponding GitHub release doesn't exist, so a real RustlerPrecompiled
  # smoke would try to download a non-existent artifact. A full end-to-end
  # Elixir smoke is added in a follow-up release once we can point it at
  # a stable release URL.
  # ===========================================================================
  smoke-test-nifs:
    name: smoke test NIF (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [preflight, build-elixir-nifs]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Download NIF artifact (NIF version 2.17)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nif-2.17-${{ matrix.target }}
          path: nif-stage/

      - name: Verify tarball contents
        shell: bash
        run: |
          set -euo pipefail
          ls -la nif-stage/
          # There should be exactly one .tar.gz in nif-stage/.
          tar -xzf nif-stage/*.tar.gz -C nif-stage/
          ls -la nif-stage/

          # The inner artifact name is the rustler_precompiled-shaped
          # libprefix + name + version + nif + target + ext.
          case "${{ matrix.target }}" in
            *-pc-windows-*) inner="nif-stage/jailguard_nif-v"*"-${{ matrix.target }}.dll" ;;
            *)              inner="nif-stage/libjailguard_nif-v"*"-${{ matrix.target }}.so" ;;
          esac
          # shellcheck disable=SC2086
          files=$(ls $inner 2>/dev/null || true)
          if [ -z "$files" ]; then
            echo "::error::no NIF artifact matched pattern '$inner'"
            ls -la nif-stage/
            exit 1
          fi
          for f in $files; do
            size=$(wc -c < "$f")
            echo "$f: $size bytes"
            if [ "$size" -lt 1000000 ]; then
              echo "::error::$f is suspiciously small (< 1 MB)"
              exit 1
            fi
          done

      - name: Verify nif_init export (Linux x86_64 only)
        # nif_init is an exported symbol the BEAM dlopens at NIF load time.
        # We only run this check on native-Linux-x86 because:
        #   - macOS native nm uses BSD-style flags; -D means "demangle" not
        #     "dynamic symbols", so the GNU invocation produces nothing
        #     useful. macOS `strip = "symbols"` also strips the symtab
        #     enough that `strings` doesn't reliably reveal nif_init.
        #   - Cross-built artifacts (aarch64-linux from x86 runner) can't
        #     be inspected with the host's nm.
        # The build job already ran `cargo build` to a successful linker
        # exit, which is the strongest signal that exports are correct;
        # this nm check is belt-and-suspenders for the one platform
        # where it works cleanly.
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          for f in nif-stage/libjailguard_nif-v*-${{ matrix.target }}.so; do
            if nm -D --defined-only "$f" | grep -q nif_init; then
              echo "✓ $f exports nif_init"
            else
              echo "::error::$f does not appear to export nif_init"
              exit 1
            fi
          done

  # ===========================================================================
  # Docker smoke tests for Linux wheels.
  # Installs the actual wheel inside the target distro and verifies that
  # `import jailguard` works. Catches libc / glibc / symbol mismatches that
  # passed maturin's build but fail at runtime in production environments.
  # ===========================================================================
  smoke-test-wheels:
    name: smoke test wheel (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [preflight, build-wheels-linux]
    if: needs.preflight.outputs.is_dry_run == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          # manylinux_2_28 wheels run inside RHEL 8 / Ubuntu 20.04 / Debian 11 / AL2023
          - image: amazonlinux:2023
            wheel-source: wheels-linux-x86_64-manylinux_2_28
            install: dnf install -y python3.11 python3.11-pip
            python: python3.11
          - image: debian:bookworm-slim
            wheel-source: wheels-linux-x86_64-manylinux_2_28
            install: apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv --no-install-recommends && rm -rf /var/lib/apt/lists/*
            python: python3
          # musllinux smoke deferred (no musllinux wheel artifact —
          # ort-sys lacks musl prebuilts; see build-wheels-linux matrix).
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download wheel artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.wheel-source }}
          path: dist/

      - name: List downloaded wheels
        run: ls -la dist/

      - name: Run smoke test inside ${{ matrix.image }}
        env:
          SMOKE_IMAGE: ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/.github/scripts/smoke-test.py:/smoke.py:ro" \
            -e SMOKE_IMAGE \
            ${{ matrix.image }} \
            sh -c '
              set -eu
              ${{ matrix.install }}
              # Install into an isolated venv so we don'\''t have to fight
              # PEP 668 EXTERNALLY-MANAGED markers (debian:bookworm) or
              # patch around pip versions too old to know
              # --break-system-packages (amazonlinux:2023 ships pip 22.x).
              ${{ matrix.python }} -m venv /tmp/venv
              /tmp/venv/bin/pip install --no-index --find-links=/dist jailguard
              /tmp/venv/bin/python /smoke.py
            '

  # ===========================================================================
  # Phase 5.2 — multi-registry publish (gated on dry-run flag)
  # ===========================================================================
  publish-crates-io:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: [preflight, build-native, build-wheels-linux, build-wheels-macos, smoke-test-wheels]
    if: needs.preflight.outputs.is_dry_run == 'false'
    environment:
      name: release-crates-io
      url: https://crates.io/crates/jailguard/${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [preflight, build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist, smoke-test-wheels]
    if: needs.preflight.outputs.is_dry_run == 'false'
    environment:
      name: release-pypi
      url: https://pypi.org/project/jailguard/${{ needs.preflight.outputs.version }}/
    steps:
      # Pull ONLY Python artifacts into dist/. Earlier releases used a
      # pattern-less download here, which pulled every artifact (napi
      # addons, libjailguard.so/.a, jailguard.h, the SHA256SUMS manifest)
      # into dist/ — twine then rejected the upload with
      # `InvalidDistribution: Unknown distribution format: 'SHA256SUMS'`
      # before any wheel was uploaded. PyPI never received 0.1.0 or 0.1.1.
      - name: Download wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          pattern: wheels-*
          merge-multiple: true
      - name: Download sdist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          pattern: sdist
          merge-multiple: true
      - name: Verify dist/ contains only wheels + sdist
        run: |
          ls -la dist/
          # Fail fast if anything other than .whl / .tar.gz slipped in.
          shopt -s nullglob
          bad=()
          for f in dist/*; do
            case "$f" in
              *.whl|*.tar.gz) ;;
              *) bad+=("$f") ;;
            esac
          done
          if [ ${#bad[@]} -ne 0 ]; then
            echo "::error::non-distribution files in dist/: ${bad[*]}"
            exit 1
          fi
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: [preflight, build-native, smoke-test-wheels]
    if: needs.preflight.outputs.is_dry_run == 'false'
    permissions:
      id-token: write   # npm provenance
    environment:
      name: release-npm
      url: https://www.npmjs.com/package/@yfedoseev/jailguard/v/${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download per-target addon artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: addon-artifacts/
          pattern: addon-*

      - name: Stage prebuilds for npm tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p js/prebuilds

          # Cargo target triple → npm prebuilds directory name.
          declare -A MAP=(
            [x86_64-unknown-linux-gnu]=linux-x64
            [aarch64-unknown-linux-gnu]=linux-arm64
            [x86_64-apple-darwin]=darwin-x64
            [aarch64-apple-darwin]=darwin-arm64
            [x86_64-pc-windows-msvc]=win32-x64
          )

          for art in addon-artifacts/addon-*/; do
            triple="$(basename "$art" | sed 's/^addon-//')"
            dest="${MAP[$triple]:-}"
            if [ -z "$dest" ]; then
              echo "::warning::unknown target triple $triple — skipping"
              continue
            fi
            # The build-native job uploads each addon as
            # jailguard.<cargo-triple>.node; rename it to the canonical
            # jailguard.node the loader requires.
            mkdir -p "js/prebuilds/${dest}"
            cp "${art}jailguard.${triple}.node" "js/prebuilds/${dest}/jailguard.node"
          done

          echo "=== Staged prebuilds ==="
          find js/prebuilds -type f | sort

      - name: TypeScript build (prepack runs again at publish time)
        working-directory: js
        run: |
          npm ci
          npm run build

      - name: npm publish
        working-directory: js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  publish-go:
    name: tag Go module
    runs-on: ubuntu-latest
    needs: [preflight, build-native, smoke-test-wheels]
    if: needs.preflight.outputs.is_dry_run == 'false'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Push go module subpath tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "go/v${VERSION}"
          git push origin "go/v${VERSION}"

  # ===========================================================================
  # Package per-platform Go FFI tarballs (static + shared library variants).
  # Consumed by the Go installer at runtime
  # (go/cmd/install) — see go/README.md.
  # ===========================================================================
  package-go-ffi:
    name: package Go FFI tarballs
    runs-on: ubuntu-latest
    needs: [preflight, build-native, smoke-test-wheels]
    if: needs.preflight.outputs.is_dry_run == 'false'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download every native-lib artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: native-libs/
          pattern: native-*

      - name: List native artifacts
        run: find native-libs/ -type f | sort

      - name: Pack Go FFI tarballs
        shell: bash
        run: |
          set -euo pipefail
          OUT="$PWD/go-ffi-out"
          mkdir -p "$OUT"

          pack_static() {
            local platform="$1" target="$2" libfile="${3:-libjailguard.a}"
            local src="native-libs/native-${target}"
            local tmp; tmp="$(mktemp -d)"
            mkdir -p "$tmp/lib/$platform" "$tmp/include"

            if [ ! -f "$src/$libfile" ]; then
              echo "::error::missing $libfile for $target"
              return 1
            fi
            cp "$src/$libfile"    "$tmp/lib/$platform/$libfile"
            cp "$src/jailguard.h" "$tmp/include/jailguard.h"

            local slug="${platform/_/-}"
            local tgz="$OUT/jailguard-go-ffi-${slug}.tar.gz"
            tar -C "$tmp" -czf "$tgz" lib include
            (cd "$OUT" && sha256sum "jailguard-go-ffi-${slug}.tar.gz" > "jailguard-go-ffi-${slug}.tar.gz.sha256")
            rm -rf "$tmp"
          }

          pack_shared() {
            local platform="$1" target="$2" libfile="$3"
            local src="native-libs/native-${target}"
            local tmp; tmp="$(mktemp -d)"
            mkdir -p "$tmp/lib/$platform" "$tmp/include"

            if [ ! -f "$src/$libfile" ]; then
              echo "::error::missing $libfile for $target"
              return 1
            fi
            cp "$src/$libfile"    "$tmp/lib/$platform/$libfile"
            cp "$src/jailguard.h" "$tmp/include/jailguard.h"

            local slug="${platform/_/-}"
            local tgz="$OUT/jailguard-go-ffi-shared-${slug}.tar.gz"
            tar -C "$tmp" -czf "$tgz" lib include
            (cd "$OUT" && sha256sum "jailguard-go-ffi-shared-${slug}.tar.gz" > "jailguard-go-ffi-shared-${slug}.tar.gz.sha256")
            rm -rf "$tmp"
          }

          # Static (.a) — for the CGo backend, statically linked.
          pack_static linux_amd64   x86_64-unknown-linux-gnu  libjailguard.a
          pack_static linux_arm64   aarch64-unknown-linux-gnu libjailguard.a
          pack_static darwin_amd64  x86_64-apple-darwin       libjailguard.a
          pack_static darwin_arm64  aarch64-apple-darwin      libjailguard.a
          # windows_amd64 static: deferred. Our jailguard.lib is built with MSVC
          # but Go's cgo on Windows uses mingw-gcc, which can't resolve MSVC-
          # mangled C++ symbols in the bundled onnxruntime. Needs a parallel
          # x86_64-pc-windows-gnu build — tracked for 0.1.3.

          # Shared (.so/.dylib/.dll) — for the purego backend, dlopen'd at runtime.
          pack_shared linux_amd64   x86_64-unknown-linux-gnu  libjailguard.so
          pack_shared linux_arm64   aarch64-unknown-linux-gnu libjailguard.so
          pack_shared darwin_amd64  x86_64-apple-darwin       libjailguard.dylib
          pack_shared darwin_arm64  aarch64-apple-darwin      libjailguard.dylib
          # windows_amd64 shared: deferred for the same MSVC/mingw mismatch.
          # The purego backend doesn't need MSVC symbols at link time, but
          # we'd still need a gnu-built jailguard.dll for symbol-loading at
          # runtime to be reliable. Tracked for 0.1.3.

          ls -la "$OUT"

      - name: Verify Go FFI tarball checksums
        shell: bash
        run: |
          set -euo pipefail
          cd go-ffi-out
          # sha256sum -c reads each .sha256 sidecar and verifies the matching
          # .tar.gz against it. Fails the job if any sidecar is stale or
          # any tarball is corrupted in transit.
          for sum in *.sha256; do
            sha256sum -c "$sum"
          done
          count=$(ls *.tar.gz | wc -l)
          echo "✓ all $count tarballs match their .sha256 sidecars"

      - name: Verify Go FFI tarball contents
        shell: bash
        run: |
          set -euo pipefail
          # Every tarball must contain include/jailguard.h and a non-empty
          # lib/<platform>/libjailguard.{a,so,dylib} or jailguard.dll.
          for tgz in go-ffi-out/jailguard-go-ffi-*.tar.gz; do
            listing="$(tar -tzf "$tgz")"
            if ! echo "$listing" | grep -q "^include/jailguard\.h$"; then
              echo "::error::$tgz missing include/jailguard.h"
              exit 1
            fi
            if ! echo "$listing" | grep -qE "^lib/[^/]+/(libjailguard\.(a|so|dylib)|jailguard\.(dll|lib))$"; then
              echo "::error::$tgz missing a recognized lib file under lib/<platform>/"
              echo "$listing"
              exit 1
            fi
          done
          echo "✓ all tarballs contain include/jailguard.h + a lib file"

      - name: Upload Go FFI tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: go-ffi
          path: go-ffi-out/

  # ===========================================================================
  # GitHub Release — collect all artifacts, attach to a release
  # ===========================================================================
  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [preflight, build-native, build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist, build-elixir-nifs, package-go-ffi, smoke-test-wheels]
    if: needs.preflight.outputs.is_dry_run == 'false'
    permissions:
      contents: write
    environment:
      name: release-github
      url: https://github.com/yfedoseev/jailguard/releases/tag/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download every artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Show artifact tree
        run: |
          ls -la artifacts/
          find artifacts/ -type f | head -50

      - name: Generate SBOM (cargo-cyclonedx)
        run: |
          cargo install --locked cargo-cyclonedx
          cargo cyclonedx --format json --spec-version 1.5 --override-filename sbom.cdx
          mv sbom.cdx.json artifacts/sbom-jailguard-v${{ needs.preflight.outputs.version }}.cdx.json
          ls -la artifacts/sbom-*.cdx.json

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          chmod +x .github/scripts/extract-release-notes.sh
          .github/scripts/extract-release-notes.sh "${{ needs.preflight.outputs.version }}"
          {
            echo "title<<EOF"
            cat release-title.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "--- release-title.txt ---"
          cat release-title.txt
          echo "--- release-notes.md (head) ---"
          head -40 release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.notes.outputs.title }}
          body_path: release-notes.md
          files: |
            artifacts/**/*

  # ===========================================================================
  # Hex.pm publish — depends on github-release because rustler_precompiled's
  # checksum-download task fetches the NIF .tar.gz files from the release.
  # ===========================================================================
  publish-hex:
    name: publish to Hex
    runs-on: ubuntu-latest
    needs: [preflight, build-elixir-nifs, smoke-test-nifs, github-release]
    if: needs.preflight.outputs.is_dry_run == 'false'
    environment:
      name: release-hex
      url: https://hex.pm/packages/jailguard/${{ needs.preflight.outputs.version }}
    defaults:
      run:
        working-directory: elixir
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          elixir-version: "1.17"

      - name: Install hex + rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch Mix deps
        run: mix deps.get

      - name: Download checksums for precompiled NIFs
        env:
          # Asks rustler_precompiled to fetch the .tar.gz files we just
          # attached to the GH release and write the canonical checksum file.
          RUSTLER_PRECOMPILED_FORCE_BUILD_ALL: "false"
        run: mix rustler_precompiled.download JailGuard.Native --all --print

      - name: Verify checksum file present
        run: |
          test -f checksum-Elixir.JailGuard.Native.exs
          echo "--- checksum-Elixir.JailGuard.Native.exs ---"
          cat checksum-Elixir.JailGuard.Native.exs | head -20

      - name: mix hex.publish
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes

  # ===========================================================================
  # Aggregate gate — release succeeds only if every binding published.
  # ===========================================================================
  release-success:
    name: release success
    if: always() && needs.preflight.outputs.is_dry_run == 'false'
    needs: [preflight, publish-crates-io, publish-pypi, publish-npm, publish-go, publish-hex, github-release]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "All registries published OK for v${{ needs.preflight.outputs.version }}"
