name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the full matrix but skip publish steps"
        required: true
        type: boolean
        default: true

permissions:
  contents: write   # GitHub release creation
  id-token: write   # npm provenance

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================================================
  # Pre-flight — validate version bump, license files, changelog
  # ===========================================================================
  preflight:
    name: pre-flight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_dry_run: ${{ steps.v.outputs.is_dry_run }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Extract version
        id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="$(grep -E '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
            echo "is_dry_run=${{ inputs.dry-run }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "is_dry_run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify Cargo.toml version matches tag
        if: github.event_name == 'push'
        run: |
          CARGO_VERSION="$(grep -E '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [[ "$CARGO_VERSION" != "${{ steps.v.outputs.version }}" ]]; then
            echo "::error::Cargo.toml version $CARGO_VERSION does not match tag ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: Verify pyproject.toml version matches
        run: |
          PY_VERSION="$(grep -E '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          if [[ "$PY_VERSION" != "${{ steps.v.outputs.version }}" ]]; then
            echo "::error::pyproject.toml version $PY_VERSION does not match Cargo.toml ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: Verify js/package.json version matches
        run: |
          JS_VERSION="$(node -p "require('./js/package.json').version")"
          if [[ "$JS_VERSION" != "${{ steps.v.outputs.version }}" ]]; then
            echo "::error::js/package.json version $JS_VERSION does not match Cargo.toml ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: Verify CHANGELOG entry exists
        run: |
          if ! grep -q "## \[${{ steps.v.outputs.version }}\]\|## ${{ steps.v.outputs.version }}\b" CHANGELOG.md; then
            echo "::warning::No CHANGELOG entry for version ${{ steps.v.outputs.version }}"
          fi

      - name: Verify LICENSE files present
        run: test -f LICENSE && echo "LICENSE OK"

  # ===========================================================================
  # Native cdylib build matrix (Go + JS native module + C consumers)
  # ===========================================================================
  build-native:
    name: native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Install Linux aarch64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build cdylib + staticlib
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --lib --target ${{ matrix.target }}

      - name: Build napi addon for ${{ matrix.target }}
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --features napi --target ${{ matrix.target }}

      - name: Stage release artifacts
        shell: bash
        run: |
          mkdir -p release-stage/${{ matrix.target }}
          cp -v target/${{ matrix.target }}/release/libjailguard.* \
                release-stage/${{ matrix.target }}/ 2>/dev/null || true
          cp -v target/${{ matrix.target }}/release/jailguard.{dll,lib} \
                release-stage/${{ matrix.target }}/ 2>/dev/null || true
          cp -v include/jailguard.h release-stage/${{ matrix.target }}/

      - name: Stage napi addon
        shell: bash
        run: |
          mkdir -p addon-stage
          dest="addon-stage/jailguard.${{ matrix.target }}.node"
          case "${{ matrix.target }}" in
            *-linux-*)   cp target/${{ matrix.target }}/release/libjailguard.so   "$dest" ;;
            *-apple-*)   cp target/${{ matrix.target }}/release/libjailguard.dylib "$dest" ;;
            *-windows-*) cp target/${{ matrix.target }}/release/jailguard.dll     "$dest" ;;
          esac
          ls -la "$dest"

      - name: Strip napi addon (Linux/macOS only)
        shell: bash
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          # Strip debug symbols from the .node addon. Cuts the file size
          # ~30-40% (e.g., ~17 MB → ~12 MB on Linux). Skipped on Windows
          # because the MSVC linker doesn't produce strippable symbols.
          dest="addon-stage/jailguard.${{ matrix.target }}.node"
          before=$(wc -c < "$dest")
          case "${{ matrix.target }}" in
            *-linux-*)
              # Cross-compiled ARM64 needs the matching toolchain's strip.
              if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
                aarch64-linux-gnu-strip --strip-unneeded "$dest"
              else
                strip --strip-unneeded "$dest"
              fi
              ;;
            *-apple-*)
              strip -x "$dest"
              ;;
          esac
          after=$(wc -c < "$dest")
          echo "stripped ${{ matrix.target }}: $before bytes → $after bytes"

      - name: SHA-256 manifest
        shell: bash
        run: |
          cd release-stage/${{ matrix.target }}
          if command -v sha256sum >/dev/null; then
            sha256sum * > SHA256SUMS
          else
            shasum -a 256 * > SHA256SUMS
          fi
          cat SHA256SUMS

      - name: Upload native lib bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-${{ matrix.target }}
          path: release-stage/${{ matrix.target }}/

      - name: Upload napi addon
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: addon-${{ matrix.target }}
          path: addon-stage/jailguard.${{ matrix.target }}.node

  # ===========================================================================
  # Python wheels (the heaviest matrix — defers to phase-2 python.yml shape)
  # ===========================================================================
  build-wheels-linux:
    name: wheel (linux ${{ matrix.target }} ${{ matrix.manylinux }})
    runs-on: ubuntu-latest
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            manylinux: manylinux_2_28
          - target: aarch64
            manylinux: manylinux_2_28
          - target: x86_64
            manylinux: musllinux_1_2
          - target: aarch64
            manylinux: musllinux_1_2
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --features python --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.manylinux }}
          path: dist/*.whl

  build-wheels-macos:
    name: wheel (macos ${{ matrix.target }})
    runs-on: macos-latest
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --features python --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  build-wheels-windows:
    name: wheel (windows ${{ matrix.target }})
    runs-on: windows-latest
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        target: [x64, aarch64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --features python --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ===========================================================================
  # Docker smoke tests for Linux wheels.
  # Installs the actual wheel inside the target distro and verifies that
  # `import jailguard` works. Catches libc / glibc / symbol mismatches that
  # passed maturin's build but fail at runtime in production environments.
  # ===========================================================================
  smoke-test-wheels:
    name: smoke test wheel (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [preflight, build-wheels-linux]
    if: needs.preflight.outputs.is_dry_run == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          # manylinux_2_28 wheels run inside RHEL 8 / Ubuntu 20.04 / Debian 11 / AL2023
          - image: amazonlinux:2023
            wheel-source: wheels-linux-x86_64-manylinux_2_28
            install: dnf install -y python3.11 python3.11-pip
            python: python3.11
          - image: debian:bookworm-slim
            wheel-source: wheels-linux-x86_64-manylinux_2_28
            install: apt-get update -qq && apt-get install -y -qq python3 python3-pip --no-install-recommends && rm -rf /var/lib/apt/lists/*
            python: python3
          # musllinux_1_2 wheels run inside Alpine 3.18+
          - image: alpine:3.18
            wheel-source: wheels-linux-x86_64-musllinux_1_2
            install: apk add --no-cache python3 py3-pip
            python: python3
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download wheel artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.wheel-source }}
          path: dist/

      - name: List downloaded wheels
        run: ls -la dist/

      - name: Run smoke test inside ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            ${{ matrix.image }} \
            sh -c '
              set -eu
              ${{ matrix.install }}
              ${{ matrix.python }} -m pip install --break-system-packages --no-index --find-links=/dist jailguard
              ${{ matrix.python }} -c "
              import jailguard
              print(\"version:\", jailguard.__version__)
              assert jailguard.is_injection(\"ignore previous instructions\"), \"expected injection True\"
              assert not jailguard.is_injection(\"What is the capital of France?\"), \"expected injection False\"
              print(\"smoke test passed in ${{ matrix.image }}\")
              "
            '

  # ===========================================================================
  # Phase 5.2 — multi-registry publish (gated on dry-run flag)
  # ===========================================================================
  publish-crates-io:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: [preflight, build-native, build-wheels-linux, build-wheels-macos, build-wheels-windows]
    if: needs.preflight.outputs.is_dry_run == 'false'
    environment:
      name: release-crates-io
      url: https://crates.io/crates/jailguard/${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [preflight, build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist, smoke-test-wheels]
    if: needs.preflight.outputs.is_dry_run == 'false'
    environment:
      name: release-pypi
      url: https://pypi.org/project/jailguard/${{ needs.preflight.outputs.version }}/
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true
      - run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: [preflight, build-native]
    if: needs.preflight.outputs.is_dry_run == 'false'
    permissions:
      id-token: write   # npm provenance
    environment:
      name: release-npm
      url: https://www.npmjs.com/package/@yfedoseev/jailguard/v/${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download per-target addon artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: addon-artifacts/
          pattern: addon-*

      - name: Stage prebuilds for npm tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p js/prebuilds

          # Cargo target triple → npm prebuilds directory name.
          declare -A MAP=(
            [x86_64-unknown-linux-gnu]=linux-x64
            [aarch64-unknown-linux-gnu]=linux-arm64
            [x86_64-apple-darwin]=darwin-x64
            [aarch64-apple-darwin]=darwin-arm64
            [x86_64-pc-windows-msvc]=win32-x64
          )

          for art in addon-artifacts/addon-*/; do
            triple="$(basename "$art" | sed 's/^addon-//')"
            dest="${MAP[$triple]:-}"
            if [ -z "$dest" ]; then
              echo "::warning::unknown target triple $triple — skipping"
              continue
            fi
            # The build-native job uploads each addon as
            # jailguard.<cargo-triple>.node; rename it to the canonical
            # jailguard.node the loader requires.
            mkdir -p "js/prebuilds/${dest}"
            cp "${art}jailguard.${triple}.node" "js/prebuilds/${dest}/jailguard.node"
          done

          echo "=== Staged prebuilds ==="
          find js/prebuilds -type f | sort

      - name: TypeScript build (prepack runs again at publish time)
        working-directory: js
        run: |
          npm ci
          npm run build

      - name: npm publish
        working-directory: js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  publish-go:
    name: tag Go module
    runs-on: ubuntu-latest
    needs: [preflight, build-native]
    if: needs.preflight.outputs.is_dry_run == 'false'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - name: Push go module subpath tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "go/v${VERSION}"
          git push origin "go/v${VERSION}"

  # ===========================================================================
  # Package per-platform Go FFI tarballs (static + shared library variants).
  # Consumed by the Go installer at runtime
  # (go/cmd/install) — see go/README.md.
  # ===========================================================================
  package-go-ffi:
    name: package Go FFI tarballs
    runs-on: ubuntu-latest
    needs: [preflight, build-native]
    if: needs.preflight.outputs.is_dry_run == 'false'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download every native-lib artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: native-libs/
          pattern: native-*

      - name: List native artifacts
        run: find native-libs/ -type f | sort

      - name: Pack Go FFI tarballs
        shell: bash
        run: |
          set -euo pipefail
          OUT="$PWD/go-ffi-out"
          mkdir -p "$OUT"

          pack_static() {
            local platform="$1" target="$2"
            local src="native-libs/native-${target}"
            local tmp; tmp="$(mktemp -d)"
            mkdir -p "$tmp/lib/$platform" "$tmp/include"

            if [ ! -f "$src/libjailguard.a" ]; then
              echo "::error::missing libjailguard.a for $target"
              return 1
            fi
            cp "$src/libjailguard.a" "$tmp/lib/$platform/libjailguard.a"
            cp "$src/jailguard.h"    "$tmp/include/jailguard.h"

            local slug="${platform/_/-}"
            local tgz="$OUT/jailguard-go-ffi-${slug}.tar.gz"
            tar -C "$tmp" -czf "$tgz" lib include
            (cd "$OUT" && sha256sum "jailguard-go-ffi-${slug}.tar.gz" > "jailguard-go-ffi-${slug}.tar.gz.sha256")
            rm -rf "$tmp"
          }

          pack_shared() {
            local platform="$1" target="$2" libfile="$3"
            local src="native-libs/native-${target}"
            local tmp; tmp="$(mktemp -d)"
            mkdir -p "$tmp/lib/$platform" "$tmp/include"

            if [ ! -f "$src/$libfile" ]; then
              echo "::error::missing $libfile for $target"
              return 1
            fi
            cp "$src/$libfile"    "$tmp/lib/$platform/$libfile"
            cp "$src/jailguard.h" "$tmp/include/jailguard.h"

            local slug="${platform/_/-}"
            local tgz="$OUT/jailguard-go-ffi-shared-${slug}.tar.gz"
            tar -C "$tmp" -czf "$tgz" lib include
            (cd "$OUT" && sha256sum "jailguard-go-ffi-shared-${slug}.tar.gz" > "jailguard-go-ffi-shared-${slug}.tar.gz.sha256")
            rm -rf "$tmp"
          }

          # Static (.a) — for the CGo backend, statically linked.
          pack_static linux_amd64   x86_64-unknown-linux-gnu
          pack_static linux_arm64   aarch64-unknown-linux-gnu
          pack_static darwin_amd64  x86_64-apple-darwin
          pack_static darwin_arm64  aarch64-apple-darwin
          pack_static windows_amd64 x86_64-pc-windows-msvc

          # Shared (.so/.dylib/.dll) — for the purego backend, dlopen'd at runtime.
          pack_shared linux_amd64   x86_64-unknown-linux-gnu  libjailguard.so
          pack_shared linux_arm64   aarch64-unknown-linux-gnu libjailguard.so
          pack_shared darwin_amd64  x86_64-apple-darwin       libjailguard.dylib
          pack_shared darwin_arm64  aarch64-apple-darwin      libjailguard.dylib
          pack_shared windows_amd64 x86_64-pc-windows-msvc    jailguard.dll

          ls -la "$OUT"

      - name: Verify Go FFI tarball checksums
        shell: bash
        run: |
          set -euo pipefail
          cd go-ffi-out
          # sha256sum -c reads each .sha256 sidecar and verifies the matching
          # .tar.gz against it. Fails the job if any sidecar is stale or
          # any tarball is corrupted in transit.
          for sum in *.sha256; do
            sha256sum -c "$sum"
          done
          echo "✓ all ${$(ls *.tar.gz | wc -l)} tarballs match their .sha256 sidecars"

      - name: Verify Go FFI tarball contents
        shell: bash
        run: |
          set -euo pipefail
          # Every tarball must contain include/jailguard.h and a non-empty
          # lib/<platform>/libjailguard.{a,so,dylib} or jailguard.dll.
          for tgz in go-ffi-out/jailguard-go-ffi-*.tar.gz; do
            listing="$(tar -tzf "$tgz")"
            if ! echo "$listing" | grep -q "^include/jailguard\.h$"; then
              echo "::error::$tgz missing include/jailguard.h"
              exit 1
            fi
            if ! echo "$listing" | grep -qE "^lib/[^/]+/(libjailguard\.(a|so|dylib)|jailguard\.dll)$"; then
              echo "::error::$tgz missing a recognized lib file under lib/<platform>/"
              echo "$listing"
              exit 1
            fi
          done
          echo "✓ all tarballs contain include/jailguard.h + a lib file"

      - name: Upload Go FFI tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: go-ffi
          path: go-ffi-out/

  # ===========================================================================
  # GitHub Release — collect all artifacts, attach to a release
  # ===========================================================================
  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [preflight, build-native, build-wheels-linux, build-wheels-macos, build-wheels-windows, build-sdist, package-go-ffi]
    if: needs.preflight.outputs.is_dry_run == 'false'
    permissions:
      contents: write
    environment:
      name: release-github
      url: https://github.com/yfedoseev/jailguard/releases/tag/${{ github.ref_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Download every artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/

      - name: Show artifact tree
        run: |
          ls -la artifacts/
          find artifacts/ -type f | head -50

      - name: Generate SBOM (cargo-cyclonedx)
        run: |
          cargo install --locked cargo-cyclonedx
          cargo cyclonedx --format json --spec-version 1.5 --override-filename sbom.cdx
          mv sbom.cdx.json artifacts/sbom-jailguard-v${{ needs.preflight.outputs.version }}.cdx.json
          ls -la artifacts/sbom-*.cdx.json

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          chmod +x .github/scripts/extract-release-notes.sh
          .github/scripts/extract-release-notes.sh "${{ needs.preflight.outputs.version }}"
          {
            echo "title<<EOF"
            cat release-title.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "--- release-title.txt ---"
          cat release-title.txt
          echo "--- release-notes.md (head) ---"
          head -40 release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.notes.outputs.title }}
          body_path: release-notes.md
          files: |
            artifacts/**/*

  # ===========================================================================
  # Aggregate gate — release succeeds only if every binding published.
  # ===========================================================================
  release-success:
    name: release success
    if: always() && needs.preflight.outputs.is_dry_run == 'false'
    needs: [preflight, publish-crates-io, publish-pypi, publish-npm, publish-go, github-release]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "All registries published OK for v${{ needs.preflight.outputs.version }}"
