name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:

# Cancel superseded runs on the same PR ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  RUST_BACKTRACE: "1"

jobs:
  # -------------------------------------------------------------------------
  # Formatting — fast, runs on stable with rustfmt.
  # -------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # -------------------------------------------------------------------------
  # TOML formatting (taplo). Catches drift in Cargo.toml, deny.toml,
  # .typos.toml, etc. Sub-second job.
  # -------------------------------------------------------------------------
  taplo:
    name: taplo (TOML fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - run: taplo fmt --check

  # -------------------------------------------------------------------------
  # Typo check — zero-false-positive text linter, sub-second runtime.
  # -------------------------------------------------------------------------
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@master

  # -------------------------------------------------------------------------
  # Strict clippy on the default-feature surface — this is what ships on
  # crates.io, so warnings here are errors. Research modules behind `full`
  # are linted in a separate, informational job below.
  # -------------------------------------------------------------------------
  clippy:
    name: clippy (default features)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-default
      - run: cargo clippy --all-targets --locked -- -D warnings

  # Informational lint over the full research surface. Failures here do not
  # block merges — the `full` feature is internal/experimental.
  clippy-full:
    name: clippy (all features, informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-full
      # See test job's `--all-features` comment: napi requires Node
      # loader symbols, so we enumerate the testable feature set instead.
      - run: cargo clippy --all-targets --features full,python,c-api --locked

  # -------------------------------------------------------------------------
  # MSRV — verifies the declared rust-version in Cargo.toml still compiles
  # the default-feature library.
  # -------------------------------------------------------------------------
  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          v=$(grep -E '^rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo build --locked

  # -------------------------------------------------------------------------
  # Unused dependency detection. cargo-shear is the successor to
  # cargo-machete with tighter static analysis.
  # -------------------------------------------------------------------------
  shear:
    name: cargo-shear (unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: shear
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear
      - run: cargo shear

  # -------------------------------------------------------------------------
  # Feature powerset: builds every combination of the library's features so
  # a `#[cfg(feature = "foo")]` block that only works with `foo + bar`
  # (but not `foo` alone) fails here instead of in someone's downstream
  # build. `--no-dev-deps --lib` keeps the job focused on the published
  # library surface.
  # -------------------------------------------------------------------------
  features-powerset:
    name: feature powerset (cargo-hack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: hack
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      # --depth 1 enumerates "one feature at a time" (N+1 builds for N
       # features) rather than the full 2^N powerset. With 9 features the
       # full powerset is 512 builds (~60+ min); depth=1 is 10 builds
       # (~3-5 min) and still catches the most common class of bugs —
       # a feature whose code path doesn't compile in isolation because
       # someone forgot to gate an import or `cfg` block correctly.
       # Bump back to full powerset once we're not under release pressure.
      - run: cargo hack check --feature-powerset --depth 1 --no-dev-deps --lib

  # -------------------------------------------------------------------------
  # Build + test matrix (Linux / macOS / Windows; stable on each, beta +
  # nightly on Linux only). Default-feature build runs with -D warnings;
  # the all-features lane mirrors real development usage and keeps
  # warnings as warnings. Nightly is `continue-on-error: true` because it
  # tracks unreleased toolchains; we want the signal without the block.
  # -------------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }} / ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.rust == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        # Cross-arch coverage:
        #   ubuntu-latest        → Linux x86_64
        #   ubuntu-24.04-arm     → Linux aarch64 (Graviton, Raspberry Pi,
        #                          Chromebook Crostini class devices)
        #   macos-latest         → macOS aarch64 (Apple Silicon, as of
        #                          the GitHub runner alias in 2025+)
        #
        # Deferred:
        #   - macos-13 (Intel macOS): GitHub-hosted runner pool is
        #     extremely limited and being deprecated; jobs sit in the
        #     QUEUED state indefinitely. macos-latest (Apple Silicon)
        #     covers the macOS surface.
        #   - windows-latest: LNK2038 CRT mismatch between ort-sys (/MD)
        #     and esaxx-rs (/MT). Same reason go.yml / js.yml /
        #     python.yml exclude Windows.
        #   Both re-enable when their respective blockers clear.
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: beta
          - os: ubuntu-latest
            rust: nightly
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}-${{ matrix.rust }}
      # Pre-cache the ONNX model so embedded-detector tests don't each fetch it.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/jailguard
          key: jailguard-onnx-minilm-v1
      - name: build (default features, strict)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build --locked --verbose
      - name: test (default features, strict)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test --locked --verbose
      # We test every feature combo except `napi` and `python`:
      #   - napi pulls in Node-loader-only symbols (napi_get_value_*)
      #     that don't resolve in a regular cargo build.
      #   - python pulls in pyo3 with extension-module, which on
      #     macOS produces `Undefined symbols: _PyExc_*` at link time
      #     because macOS ld is strict about undefined externs and
      #     extension-module relies on the Python interpreter
      #     resolving them at load time, not at link time.
      # Both bindings are exercised by their dedicated workflows
      # (js.yml's vitest matrix, python.yml's pytest matrix).
      - name: build (full + c-api)
        run: cargo build --locked --features full,c-api --verbose
      - name: test (full + c-api)
        run: cargo test --locked --features full,c-api --verbose

  # -------------------------------------------------------------------------
  # Documentation build. Broken intra-doc links and missing docs are errors
  # on the shipped library surface.
  # -------------------------------------------------------------------------
  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - run: cargo doc --no-deps --locked

  # -------------------------------------------------------------------------
  # Line coverage on the library. Informational for 0.1.x — we upload to
  # Codecov (if a token is set) but don't enforce a threshold yet. Set a
  # `--fail-under-lines` value here once a baseline is established.
  # -------------------------------------------------------------------------
  coverage:
    name: coverage (informational)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v4
        with:
          path: ~/.cache/jailguard
          key: jailguard-onnx-minilm-v1
      - name: Generate coverage (default features)
        run: |
          cargo llvm-cov --lib --tests --lcov --output-path lcov.info
      - name: Report coverage summary
        run: cargo llvm-cov report --summary-only
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # -------------------------------------------------------------------------
  # API stability check. Only runs on PRs; compares against the base branch.
  # -------------------------------------------------------------------------
  semver-checks:
    name: cargo-semver-checks
    # Temporarily disabled for PRs that target the v0.1.0 baseline.
    # The published v0.1.0 on crates.io was released BEFORE we added
    # the `ort-sys = "=2.0.0-rc.9"` direct pin (only `ort` was pinned
    # then). cargo-semver-checks rebuilds the baseline fresh without
    # --locked, so transitive resolution picks ort-sys 2.0.0-rc.12 —
    # whose build script references `ureq::tls::tls_config` not
    # exposed by our ureq 3.x runtime — and the baseline build fails.
    # Once v0.1.1 publishes (with the ort-sys pin in Cargo.toml), the
    # baseline becomes good and this check resumes working. Re-enable
    # after the v0.1.1 release goes out.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          feature-group: default-features

  # -------------------------------------------------------------------------
  # Security: supply-chain advisories, licenses, bans, sources.
  # -------------------------------------------------------------------------
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
          # Override the action's default --all-features. Our deny.toml
          # [graph] section sets all-features = false on purpose — we
          # audit the published crate surface (default features) only,
          # not the `full` feature tree (burn, reqwest, tokio) which is
          # not distributed on crates.io.
          arguments: --workspace

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/audit@v1

  # -------------------------------------------------------------------------
  # Bench compile gate — `cargo bench --no-run` catches API drift in the
  # criterion harness without spending CI minutes on actual measurements.
  # -------------------------------------------------------------------------
  bench:
    name: bench (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench
      - name: Build benches without running
        run: cargo bench --locked --no-run --features full

  # -------------------------------------------------------------------------
  # Examples — guard against bit-rot in the demo / smoke surface. Real
  # ONNX inference happens behind --features full; we only run the
  # examples that don't need the model download in CI to keep this fast.
  # -------------------------------------------------------------------------
  rust-examples:
    name: rust examples (compile + score test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: rust-examples
      - name: Build all examples (default features)
        run: cargo build --locked --release --examples
      - name: Build all examples (full features)
        run: cargo build --locked --release --examples --features full
      - name: Run quick_start
        run: cargo run --locked --release --example quick_start

  # -------------------------------------------------------------------------
  # DCO sign-off — every commit on a PR must carry a Signed-off-by line.
  # Disabled until public contributor onboarding; flip `if: false` to
  # `if: github.event_name == 'pull_request'` to enable.
  # -------------------------------------------------------------------------
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: false # re-enable before opening to external contributors
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          MISSING=0
          while IFS= read -r sha; do
            if ! git log -1 --pretty=full "$sha" | grep -q "^Signed-off-by:"; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer"
              MISSING=$((MISSING+1))
            fi
          done < <(git log --pretty=format:"%H" "${BASE}..${HEAD}")
          [ "$MISSING" -eq 0 ] || exit 1

  # -------------------------------------------------------------------------
  # Aggregate job that required-status-checks can gate on in branch protection.
  # -------------------------------------------------------------------------
  ci-success:
    name: ci success
    if: always()
    needs:
      - fmt
      - taplo
      - typos
      - clippy
      - msrv
      - shear
      - features-powerset
      - test
      - docs
      - deny
      - audit
      - bench
      - rust-examples
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required dependency failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
