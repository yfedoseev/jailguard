global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'jailguard-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'jailguard-api'
    static_configs:
      - targets: ['jailguard:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
