version: '3.8'

services:
  jailguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jailguard-api
    ports:
      - "8080:8080"  # API server
      - "9090:9090"  # Prometheus metrics
    environment:
      - RUST_LOG=info
      - JAILGUARD_BLOCK_THRESHOLD=0.7
      - JAILGUARD_STRICT_MODE=false
      - JAILGUARD_ENABLE_SPOTLIGHTING=true
      - JAILGUARD_ENABLE_DETECTION=true
      - JAILGUARD_ENABLE_OUTPUT_VALIDATION=true
      - JAILGUARD_ENABLE_MONITORING=true
    volumes:
      - ./data:/app/data:ro  # Read-only data mount
      - jailguard-logs:/var/log/jailguard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  prometheus:
    image: prom/prometheus:latest
    container_name: jailguard-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - jailguard
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: jailguard-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  jailguard-logs:
  prometheus-data:
  grafana-data:
