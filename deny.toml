# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
# We audit the shipped library surface (default features) only. The `full`
# feature pulls in the research stack (burn, reqwest, tokio, tar-based
# downloaders) that is not distributed on crates.io and not reachable from
# the public API of the published crate.
all-features = false
no-default-features = false

[advisories]
version = 2
# Ignored advisories — each entry MUST have a link and a rationale.
# Audit is scoped to default features (see `[graph]` above), so anything
# reachable only through `--features full` (burn ecosystem) is out of scope
# by design and does not need to be listed here.
ignore = [
    # `paste` is archived by dtolnay (not a security vulnerability). Reached
    # transitively via tokenizers 0.21.x; revisit when tokenizers drops it.
    # https://rustsec.org/advisories/RUSTSEC-2024-0436
    "RUSTSEC-2024-0436",
    # `number_prefix` is unmaintained (not a security vulnerability). Reached
    # transitively via tokenizers → indicatif.
    # https://rustsec.org/advisories/RUSTSEC-2025-0119
    "RUSTSEC-2025-0119",
]

[licenses]
version = 2
# Allowed licenses (permissive licenses compatible with MIT/Apache-2.0)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "0BSD",
    "Unlicense",
    # Permissive data license used by webpki-roots (transitive via ureq).
    "CDLA-Permissive-2.0",
]

[bans]
# Warn on multiple versions of the same crate (complex dependency trees)
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "deny"
# Specific crates to deny
deny = []

# API stability: semver, deprecations land as `#[deprecated]` on the symbol.
# Breaking changes are reserved for major version bumps.

[sources]
# Deny crates from unknown registries
unknown-registry = "deny"
# Deny Git sources
unknown-git = "deny"
# Allow only crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
