# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
version = 2
# Deny security vulnerabilities
ignore = [
    # bincode is unmaintained but not a security vulnerability.
    # burn is transitioning to burnpack format - will remove once burn updates.
    # See: https://github.com/tracel-ai/burn (burnpack migration in progress)
    "RUSTSEC-2025-0141",
    # paste is unmaintained (dtolnay archived it) - transitive dep via burn/cubecl.
    # Not a security vulnerability, just no longer maintained.
    "RUSTSEC-2024-0436",
    # lru IterMut soundness issue (RUSTSEC-2026-0002).
    # Affects only embedding cache iteration (non-critical path).
    # Planning upgrade to lru >=0.16.3 in v1.1.1 patch release.
    # See: https://github.com/jeromefroe/lru-rs/pull/224
    "RUSTSEC-2026-0002",
]

[licenses]
version = 2
# Allowed licenses (permissive licenses compatible with MIT/Apache-2.0)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "0BSD",
    "Unlicense",
]

[bans]
# Warn on multiple versions of the same crate (complex dependency trees)
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "deny"
# Specific crates to deny
deny = []

# API Stability Policy (v1.1.0 and beyond)
# This project follows semantic versioning and avoids breaking changes to exported APIs.
# All API changes are marked with #[deprecated] attributes pointing to replacement APIs.
# Breaking changes are only allowed in major version bumps (e.g., v1.0 → v2.0).
# See MIGRATION_GUIDE.md and PRODUCTION_READY.md for deprecation details.

[sources]
# Deny crates from unknown registries
unknown-registry = "deny"
# Deny Git sources
unknown-git = "deny"
# Allow only crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
